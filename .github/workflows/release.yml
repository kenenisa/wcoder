name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun test

      - name: Build all targets
        run: |
          bun run build:linux-x64
          bun run build:linux-arm64
          bun run build:darwin-x64
          bun run build:darwin-arm64

      - name: Compress binaries
        run: |
          for bin in wcoder-linux-x64 wcoder-linux-arm64 wcoder-darwin-x64 wcoder-darwin-arm64; do
            tar -czf "${bin}.tar.gz" "$bin"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wcoder-linux-x64.tar.gz
            wcoder-linux-arm64.tar.gz
            wcoder-darwin-x64.tar.gz
            wcoder-darwin-arm64.tar.gz
            install.sh